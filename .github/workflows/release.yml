name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows, macOS, Debian ────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: '--bundles deb,appimage'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          # universal-apple-darwin requires both arch targets on the macOS runner
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2

      - name: Install Debian/Ubuntu system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Ursula ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Fedora RPM ────────────────────────────────────────────────────────────
  # Runs after the matrix builds so the GitHub release already exists.
  build-fedora:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install system tools
        run: dnf install -y git curl

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install build dependencies
        run: |
          dnf install -y \
            webkit2gtk4.1-devel \
            openssl-devel \
            wget file \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            nodejs npm \
            rpm-build patchelf

      - run: npm ci

      - name: Build RPM
        run: npm run tauri build -- --bundles rpm

      - name: Upload RPM to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: src-tauri/target/release/bundle/rpm/*.rpm
